{% extends 'base.html' %}
{% block title %}{{ 'Editar' if doctor else 'Novo' }} Médico — CRM Clínica{% endblock %}
{% block page_title %}{{ 'Editar Médico' if doctor else 'Novo Médico' }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card">
      <div class="card-header py-3"><i class="bi bi-person-badge me-2"></i>Dados do Médico</div>
      <div class="card-body">
        <form method="post">
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label fw-medium">Nome completo <span class="text-danger">*</span></label>
              <input name="name" class="form-control" required value="{{ doctor.name if doctor else '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-medium">CRM</label>
              <input name="crm" class="form-control" placeholder="CRM-00000" value="{{ doctor.crm if doctor else '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-medium">Especialidade</label>
              <input name="specialty" class="form-control" placeholder="Ex: Cardiologia" value="{{ doctor.specialty if doctor else '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-medium">Telefone</label>
              <input name="phone" class="form-control" value="{{ doctor.phone if doctor else '' }}">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-medium">E-mail</label>
              <input type="email" name="email" class="form-control" value="{{ doctor.email if doctor else '' }}">
            </div>
            {% if doctor %}
            <div class="col-12">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="active" id="active" {{ 'checked' if doctor.active }}>
                <label class="form-check-label" for="active">Médico ativo</label>
              </div>
            </div>
            {% endif %}
          </div>
          <hr class="my-4">
          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-check-lg me-1"></i>{{ 'Salvar Alterações' if doctor else 'Cadastrar Médico' }}
            </button>
            <a href="{{ url_for('doctors') }}" class="btn btn-outline-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
